# The Crew — global configuration.
# `defaults` apply to every persona; each persona may override any key.
# Access level, autonomy, and guardrails are all driven from here (no code change
# needed to retune them) — see docs/superpowers/specs for the design.

audit_log: .logs/audit.jsonl

# Phase 3: a project's user-feedback feed -> a persona to triage.
# Portable: point `source` at any SQLite DB (with a query) or HTTP JSON endpoint.
# Enable once the triage persona (here Eva) is running.
feedback:
  enabled: false
  persona: eva
  channel: "#loquina-feedback"
  poll_interval_seconds: 60
  source:
    type: sqlite          # sqlite | http
    # --- sqlite: read-only against any DB; alias columns to the canonical names,
    #     bind :last_id and :limit. This default is wired for Loquina. ---
    db_path: /Users/m.mostafa/Workspace/code/plauda/app/data/loquina.db
    query: >
      SELECT f.id AS id, f.text AS text, f.context AS context,
             f.created_at AS created_at, a.email AS email,
             COALESCE(f.status, 'new') AS status
      FROM feedback f LEFT JOIN accounts a ON a.id = f.account_id
      WHERE f.id > :last_id ORDER BY f.id ASC LIMIT :limit
    # --- http: GET a JSON feed (alternative to sqlite) ---
    # type: http
    # url: "https://example.com/api/feedback?since={last_id}&limit={limit}"
    # headers: { Authorization: "Bearer ${FEEDBACK_API_TOKEN}" }
    # items_path: feedback          # JSON key holding the array (omit if top-level)
    # fields: { id: id, text: message, email: user.email, created_at: created_at }

# Inbound webhook (push): any project POSTs feedback to the crew, secured by a
# shared secret (read from the env var named in secret_env — never stored here).
# Bound to localhost by default; expose remotely only behind a TLS proxy.
#   curl -X POST http://127.0.0.1:8787/feedback \
#     -H "Authorization: Bearer $CREW_WEBHOOK_SECRET" \
#     -H "Content-Type: application/json" \
#     -d '{"text":"App crashes on login","email":"u@example.com"}'
# Optional payload fields: id, context, email, persona (override), channel (override).
webhook:
  enabled: false
  host: 127.0.0.1
  port: 8787
  secret_env: CREW_WEBHOOK_SECRET
  persona: eva
  channel: "#loquina-feedback"

defaults:
  access_level: full          # full | propose | sandboxed
  autonomy: autonomous         # autonomous | approve_handoffs | direct_only
  external_comms: gated        # gated | autonomous | readonly
  protected_branches: [main, master]
  block_destructive: true      # block rm -rf, force-push to protected, prod deploy
  require_branch: true         # never commit directly to a protected branch
  workdir: /Users/m.mostafa/Workspace/code/plauda   # the Loquina repo (shared context)
  model: claude-opus-4-8
  allowed_tools:
    - Read
    - Edit
    - Write
    - Bash
    - Glob
    - Grep

personas:
  # --- Phase 1: Adam, end to end ---
  adam:
    display_name: Adam
    role: Senior Developer
    workdir: /Users/m.mostafa/Workspace/code/plauda   # the real Loquina repo
    model: claude-opus-4-8
    channels: ["#adam-dev", "#crew-team"]
    bot_token_env: ADAM_SLACK_BOT_TOKEN
    app_token_env: ADAM_SLACK_APP_TOKEN
    require_branch: true
    enabled: true

  # --- Phase 2: the rest of the team (enable once their Slack apps exist) ---
  eva:
    display_name: Eva
    role: Customer Support
    channels: ["#eva-support", "#crew-team", "#loquina-feedback"]
    external_comms: gated
    require_branch: true
    enabled: true

  zakarya:
    display_name: Zakarya
    role: Product Owner & Marketing
    channels: ["#zakarya-product", "#crew-team"]
    enabled: true

  sara:
    display_name: Sara
    role: Designer
    channels: ["#sara-design", "#crew-team"]
    enabled: true
