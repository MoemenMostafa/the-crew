# The Crew — global configuration.
# `defaults` apply to every persona; each persona may override any key.
# Access level, autonomy, and guardrails are all driven from here (no code change
# needed to retune them) — see docs/superpowers/specs for the design.

audit_log: .logs/audit.jsonl

# How the personas refer to the human running the team (instead of "operator").
operator: Moamen

# Dynamic dispatch: in shared channels, an unaddressed question is picked up by
# the coordinator persona, who answers it or @mentions the right teammate(s).
# Explicit @mentions always go straight to the named person. The coordinator
# triages unaddressed questions in the channels it's in (keep it to #crew-team +
# its own home channel).
dispatch:
  enabled: true
  coordinator: zakarya

# Team broadcast: a human message carrying any of these aliases (e.g. "@team") is
# treated as a mention of EVERY persona in that channel, so the whole team replies
# — each for their own area. Literal text, no Slack user-group setup needed. Only
# humans can trigger it (bots can't, so there's no fan-out loop). Default-on; omit
# this block to keep the defaults, set enabled: false to turn it off.
broadcast:
  enabled: true
  # Each broadcast fans out to EVERY persona in the channel (one full agent turn
  # each), so keep the aliases unambiguous. Avoid common words like "here", "all",
  # or "channel" that fire by accident. Add more only if they're unlikely in normal chat.
  aliases: [team, everyone]

# Phase 3: a project's user-feedback feed -> a persona to triage.
# Portable: point `source` at any SQLite DB (with a query) or HTTP JSON endpoint.
# Enable once the triage persona (here Eva) is running.
feedback:
  enabled: false
  persona: eva
  channel: "C0BBZ58QKPW"   # #loquina-feedback — channel ID (robust for bot posting)
  poll_interval_seconds: 60
  source:
    type: sqlite          # sqlite | http
    # --- sqlite: read-only against any DB; alias columns to the canonical names,
    #     bind :last_id and :limit. This default is wired for Loquina. ---
    db_path: /Users/m.mostafa/Workspace/code/plauda/app/data/loquina.db
    query: >
      SELECT f.id AS id, f.text AS text, f.context AS context,
             f.created_at AS created_at, a.email AS email,
             COALESCE(f.status, 'new') AS status
      FROM feedback f LEFT JOIN accounts a ON a.id = f.account_id
      WHERE f.id > :last_id ORDER BY f.id ASC LIMIT :limit
    # --- http: GET a JSON feed (alternative to sqlite) ---
    # type: http
    # url: "https://example.com/api/feedback?since={last_id}&limit={limit}"
    # headers: { Authorization: "Bearer ${FEEDBACK_API_TOKEN}" }
    # items_path: feedback          # JSON key holding the array (omit if top-level)
    # fields: { id: id, text: message, email: user.email, created_at: created_at }

# Inbound webhook (push): any project POSTs feedback to the crew, secured by a
# shared secret (read from the env var named in secret_env — never stored here).
# Bound to localhost by default; expose remotely only behind a TLS proxy.
#   curl -X POST http://127.0.0.1:8787/feedback \
#     -H "Authorization: Bearer $CREW_WEBHOOK_SECRET" \
#     -H "Content-Type: application/json" \
#     -d '{"text":"App crashes on login","email":"u@example.com"}'
# Optional payload fields: id, context, email, persona (override), channel (override).
webhook:
  enabled: true
  host: 127.0.0.1
  port: 8787
  secret_env: CREW_WEBHOOK_SECRET
  persona: eva
  channel: "C0BBZ58QKPW"   # #loquina-feedback — channel ID (robust for bot posting)

# Named MCP servers a persona can opt into via its `mcp: [...]` list. Portable:
# add any stdio MCP server here. `browser` is headless Playwright (one-time:
# `npx playwright install chromium`).
mcp_servers:
  browser:
    type: stdio
    command: npx
    args: ["-y", "@playwright/mcp@latest", "--headless", "--isolated"]

defaults:
  access_level: full          # full | propose | sandboxed
  autonomy: autonomous         # autonomous | approve_handoffs | direct_only
  external_comms: gated        # gated | autonomous | readonly
  protected_branches: [main, master]
  block_destructive: true      # block rm -rf, force-push to protected, prod deploy
  require_branch: true         # never commit directly to a protected branch
  # Hard ceiling on agentic loop turns per message — caps a runaway task (e.g. an
  # endless tool-call loop) from burning tokens unbounded. null = no limit.
  max_turns: 40
  # `model` is the capable default used for real work. `model_light` is a cheaper
  # model the crew auto-selects for low-stakes turns (coordinator triage, team
  # broadcasts, short questions). Set model_light: null on a persona to always use
  # the heavy model. The router biases toward heavy when a message looks like work.
  model_light: claude-sonnet-4-6
  workdir: /Users/m.mostafa/Workspace/code/plauda   # the Loquina repo (shared context)
  model: claude-opus-4-8
  allowed_tools:
    - Read
    - Edit
    - Write
    - Bash
    - Glob
    - Grep

personas:
  # --- Phase 1: Adam, end to end ---
  adam:
    display_name: Adam
    role: Senior Developer
    workdir: /Users/m.mostafa/Workspace/code/plauda   # the real Loquina repo
    model: claude-opus-4-8
    model_light: null      # Adam does real engineering even when triaging — keep him on Opus
    channels: ["#adam-dev", "#crew-team"]
    bot_token_env: ADAM_SLACK_BOT_TOKEN
    app_token_env: ADAM_SLACK_APP_TOKEN
    require_branch: true
    mcp: [browser]          # headless browser for end-to-end testing
    enabled: true

  # --- Phase 2: the rest of the team (enable once their Slack apps exist) ---
  eva:
    display_name: Eva
    role: Customer Support
    channels: ["#eva-support", "#crew-team", "#loquina-feedback"]
    external_comms: gated
    require_branch: true
    mcp: [browser]          # headless browser to reproduce user-reported issues
    enabled: true

  zakarya:
    display_name: Zakarya
    role: Product Owner & Marketing
    channels: ["#zakarya-product", "#crew-team"]
    enabled: true

  sara:
    display_name: Sara
    role: Designer
    channels: ["#sara-design", "#crew-team"]
    mcp: [browser]          # headless browser to view/screenshot the running UI
    enabled: true
