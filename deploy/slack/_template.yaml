# Slack app manifest template for a Crew persona.
# Replace <NAME> with the persona's name (e.g. Eva). Then:
#   api.slack.com/apps → Create New App → "From a manifest" → pick the loquina
#   workspace → paste this YAML → Create.
# After creating, two tokens still need a click each (manifests can't mint tokens):
#   1. Install App → Install to workspace        → Bot token  (xoxb-…)  -> *_SLACK_BOT_TOKEN
#   2. Basic Information → App-Level Tokens → Generate (scope connections:write)
#                                                 → App token  (xapp-…)  -> *_SLACK_APP_TOKEN
display_information:
  name: <NAME>
  description: <NAME> on the Loquina crew
  background_color: "#0e1f1d"
features:
  bot_user:
    display_name: <NAME>
    always_online: true
  app_home:
    home_tab_enabled: false
    messages_tab_enabled: true            # allows DMs to this persona
    messages_tab_read_only_enabled: false # users can send messages in the DM tab
oauth_config:
  scopes:
    bot:
      - app_mentions:read     # receive @mentions
      - chat:write            # post replies
      - files:write           # attach screenshots from tests (UI/UX changes)
      - channels:history      # read public-channel messages
      - groups:history        # read private-channel messages
      - im:history            # read DMs
      - im:read               # DM metadata
      - im:write              # open/write DMs
      - reactions:write       # 👀/✅ working indicator
settings:
  event_subscriptions:
    bot_events:
      - app_mention
      - message.channels
      - message.groups
      - message.im
  interactivity:
    is_enabled: false
  org_deploy_enabled: false
  socket_mode_enabled: true   # no public Request URL needed
